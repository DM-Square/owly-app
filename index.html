<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="icon" type="image/webp" href="/favicon.webp" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Owly - Trova il tuo libro!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Raleway:wght@600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="searchContainer">
      <picture>
        <source srcset="/owly.webp" type="image/webp" />
        <img src="/owly.png" alt="Logo di Owly" class="logo" />
      </picture>
      <h1>Benvenuto su Owly!</h1>
      <p>Ciao! Sono Owly, il tuo assistente per trovare libri!</p>
      <form>
        <input
          type="text"
          id="searchInput"
          name="search"
          placeholder="Inserisci un genere di libri..."
        />
        <p id="searchAlert" class="searchAlert hidden"></p>
        <button id="searchButton" type="submit">Cerca</button>
      </form>
      <p id="searchResultsTitle" class="hidden"></p>
      <div id="searchResults"></div>
    </div>
    <script type="module" src="/src/js/main.js"></script>
    <footer>
      <p class="footer-text">© 2026 Owly. Tutti i diritti riservati.</p>
    </footer>
  </body>
</html>
